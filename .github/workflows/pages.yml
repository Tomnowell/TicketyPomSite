name: Deploy Hugo site to Pages

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true    # IMPORTANT for Tella
          fetch-depth: 0

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"
          extended: true

      - name: Setup Node for PostCSS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PostCSS deps
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: hugo --minify --destination ../_site

      - name: Verify theme directory
        run: ls -la themes/tella

      - name: Debug themes directory
        run: ls -la themes

      - name: Force clone submodule
        run: |
          rm -rf themes/tella
          git submodule deinit -f themes/tella
          git submodule update --init --recursive

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
